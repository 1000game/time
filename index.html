<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Three.js Scene</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        #info h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        #info p {
            margin: 5px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>🌌 3D Scene Controls</h3>
        <p>🖱️ Drag to rotate</p>
        <p>📱 Touch & drag on mobile</p>
        <p>🔍 Scroll/pinch to zoom</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 1000);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(8, 5, 8);
        camera.lookAt(0, 0, 0);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Create professional skysphere with gradient
        const skyGeometry = new THREE.SphereGeometry(800, 64, 64);
        const skyMaterial = new THREE.ShaderMaterial({
            uniforms: {
                topColor: { value: new THREE.Color(0x0077ff) },
                bottomColor: { value: new THREE.Color(0x000033) },
                offset: { value: 33 },
                exponent: { value: 0.6 }
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform float offset;
                uniform float exponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition + offset).y;
                    gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                }
            `,
            side: THREE.BackSide
        });
        const skySphere = new THREE.Mesh(skyGeometry, skyMaterial);
        scene.add(skySphere);

        // Add ambient stars
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2, sizeAttenuation: true });
        const starsVertices = [];
        for (let i = 0; i < 1000; i++) {
            starsVertices.push((Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const pointLight1 = new THREE.PointLight(0x00ffff, 0.5, 100);
        pointLight1.position.set(-10, 5, -10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff00ff, 0.5, 100);
        pointLight2.position.set(10, 5, 10);
        scene.add(pointLight2);

        // Create 3D box
        const boxGeometry = new THREE.BoxGeometry(2, 2, 2);
        const boxMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ff88,
            metalness: 0.7,
            roughness: 0.2,
            emissive: 0x002200,
            emissiveIntensity: 0.3
        });
        const box = new THREE.Mesh(boxGeometry, boxMaterial);
        box.castShadow = true;
        box.receiveShadow = true;
        box.position.y = 1;
        scene.add(box);

        // Add edges
        const edges = new THREE.EdgesGeometry(boxGeometry);
        const wireframe = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
        box.add(wireframe);

        // Ground plane
        const planeGeometry = new THREE.PlaneGeometry(50, 50);
        const plane = new THREE.Mesh(planeGeometry, new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.3, roughness: 0.8 }));
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        scene.add(plane);

        // Grid
        const gridHelper = new THREE.GridHelper(50, 50, 0x00ffff, 0x444444);
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Orbit Controls
        const controls = {
            target: new THREE.Vector3(0, 1, 0),
            minDistance: 3,
            maxDistance: 50,
            rotateSpeed: 0.5,
            dampingFactor: 0.05,
            spherical: new THREE.Spherical(),
            sphericalDelta: new THREE.Spherical(),
            scale: 1,
            rotateStart: new THREE.Vector2(),
            rotateEnd: new THREE.Vector2(),
            rotateDelta: new THREE.Vector2(),
            isDragging: false,
            
            update: function() {
                const offset = new THREE.Vector3();
                const quat = new THREE.Quaternion().setFromUnitVectors(camera.up, new THREE.Vector3(0, 1, 0));
                const quatInverse = quat.clone().invert();
                
                offset.copy(camera.position).sub(this.target);
                offset.applyQuaternion(quat);
                
                this.spherical.setFromVector3(offset);
                this.spherical.theta += this.sphericalDelta.theta * this.dampingFactor;
                this.spherical.phi += this.sphericalDelta.phi * this.dampingFactor;
                
                this.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, this.spherical.phi));
                this.spherical.radius *= this.scale;
                this.spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.spherical.radius));
                
                offset.setFromSpherical(this.spherical);
                offset.applyQuaternion(quatInverse);
                
                camera.position.copy(this.target).add(offset);
                camera.lookAt(this.target);
                
                this.sphericalDelta.theta *= (1 - this.dampingFactor);
                this.sphericalDelta.phi *= (1 - this.dampingFactor);
                this.scale = 1;
            }
        };

        // Events
        renderer.domElement.addEventListener('mousedown', e => {
            controls.isDragging = true;
            controls.rotateStart.set(e.clientX, e.clientY);
        });

        renderer.domElement.addEventListener('mousemove', e => {
            if (!controls.isDragging) return;
            controls.rotateEnd.set(e.clientX, e.clientY);
            controls.rotateDelta.subVectors(controls.rotateEnd, controls.rotateStart);
            controls.sphericalDelta.theta -= 2 * Math.PI * controls.rotateDelta.x / window.innerHeight * controls.rotateSpeed;
            controls.sphericalDelta.phi -= 2 * Math.PI * controls.rotateDelta.y / window.innerHeight * controls.rotateSpeed;
            controls.rotateStart.copy(controls.rotateEnd);
        });

        renderer.domElement.addEventListener('mouseup', () => controls.isDragging = false);

        renderer.domElement.addEventListener('wheel', e => {
            e.preventDefault();
            controls.scale = e.deltaY < 0 ? controls.scale / 0.95 : controls.scale * 0.95;
        }, { passive: false });

        let touchStartDistance = 0;
        renderer.domElement.addEventListener('touchstart', e => {
            e.preventDefault();
            if (e.touches.length === 1) {
                controls.isDragging = true;
                controls.rotateStart.set(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                touchStartDistance = Math.sqrt(dx * dx + dy * dy);
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 1 && controls.isDragging) {
                controls.rotateEnd.set(e.touches[0].clientX, e.touches[0].clientY);
                controls.rotateDelta.subVectors(controls.rotateEnd, controls.rotateStart);
                controls.sphericalDelta.theta -= 2 * Math.PI * controls.rotateDelta.x / window.innerHeight * controls.rotateSpeed;
                controls.sphericalDelta.phi -= 2 * Math.PI * controls.rotateDelta.y / window.innerHeight * controls.rotateSpeed;
                controls.rotateStart.copy(controls.rotateEnd);
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (touchStartDistance > 0) controls.scale = touchStartDistance / distance;
                touchStartDistance = distance;
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchend', e => {
            controls.isDragging = false;
            if (e.touches.length < 2) touchStartDistance = 0;
        });

        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            box.rotation.y += 0.005;
            box.position.y = 1 + Math.sin(time) * 0.1;
            
            pointLight1.position.x = Math.sin(time) * 10;
            pointLight1.position.z = Math.cos(time) * 10;
            pointLight2.position.x = Math.cos(time) * 10;
            pointLight2.position.z = Math.sin(time) * 10;
            
            stars.rotation.y += 0.0001;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
